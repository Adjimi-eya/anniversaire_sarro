<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Joyeux anniversaire ❤️</title>
  <link rel="stylesheet" href="style.css">
</head>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<body>

<header>
  <h1> ❤️ Joyeux anniversaire Sarro ❤️ </h1>
</header>

<div class="quiz">

  <p class="intro-text">
    Réponds correctement à ces questions pour découvrir ta surprise 🎁❤️

  <div id="question-container">
    <p id="question"></p>
    <div id="answers"></div>
    <p id="feedback"></p>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
